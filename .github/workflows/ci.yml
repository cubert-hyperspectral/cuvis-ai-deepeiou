name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Focused Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run focused tests
        run: uv run --no-sources --locked --extra dev pytest tests/cuvis_ai_deepeiou -v

  lint:
    name: Focused Ruff Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check formatting
        run: uv run --no-sources --locked --extra dev ruff format --check cuvis_ai_deepeiou tests/cuvis_ai_deepeiou

      - name: Run ruff
        run: uv run --no-sources --locked --extra dev ruff check cuvis_ai_deepeiou tests/cuvis_ai_deepeiou

  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run pip-audit for vulnerabilities
        run: uv run --no-sources --locked --extra dev pip-audit --desc on --skip-editable

      - name: Run detect-secrets
        run: |
          uv run --no-sources --locked --extra dev detect-secrets scan --all-files \
            --exclude-files '\.lock$|\.egg-info|\.pyc$|\.git/|\.pytest_cache|deep_eiou_tracker/' \
            --baseline .secrets.baseline

      - name: Run bandit security linter
        run: uv run --no-sources --locked --extra dev bandit -r cuvis_ai_deepeiou/ -c pyproject.toml

  build:
    name: Build And Validate
    needs: [test, lint, security]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build distributions
        run: uv build --no-sources

      - name: Validate distributions
        run: uv run --no-sources --locked --with twine twine check dist/*
